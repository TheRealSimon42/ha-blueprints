name: CI

'on':
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint blueprints
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linters
        run: pip install --quiet yamllint pyyaml

      - name: yamllint
        if: ${{ !cancelled() }}
        run: yamllint .

      - name: Prettier (check only)
        if: ${{ !cancelled() }}
        run: npx --yes prettier@3.5 --check .

      # Semantische Blueprint-Pruefung (siehe skills/ha-blueprint-dev).
      # cover_automation.yaml (V1) ist legacy mit bekannten Findings und bleibt
      # ausgenommen, bis die V1-Bugfixes gelandet sind.
      - name: Blueprint linter
        if: ${{ !cancelled() }}
        run: |
          python3 skills/ha-blueprint-dev/scripts/validate_blueprint.py automations/cover_automation_v2.yaml
          python3 skills/ha-blueprint-dev/scripts/validate_blueprint.py automations/convert_datetime_helper_to_time_helper.yaml
